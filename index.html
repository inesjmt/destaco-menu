<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menú Bar Destaco - Fondo dinámico</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Poppins:wght@300;500&display=swap');

    :root {
      --marron: #5b2b15;
      --bg: #ffffff;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: #000000;
      font-family: "Poppins", sans-serif;
      overflow: hidden;
      transition: background 1s ease-in-out;
    }

    /* Fondo dinámico */
    body.con-fondo {
      background: url('fondo1.png') no-repeat center top;
      background-size: contain;
      background-color: #fff;
    }

    body.sin-fondo {
      background: #ffffff !important;
      transition: background 1s ease-in-out;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    /* Logo inicial */
    .logo {
      position: absolute;
      left: 50%;
      top: 40%;
      transform: translate(-50%, -50%);
      width: 300px;
      opacity: 0;
      animation: logoAnim 3.5s ease-in-out forwards;
      background-color: #ffffff;
      padding: 10px;
      border-radius: 50%;
    }

    .titulo.inicial {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: "Playfair Display", serif;
      font-size: 2rem;
      font-weight: 700;
      opacity: 0;
      animation: tituloAnim 3.5s ease-in-out forwards;
    }

    @keyframes logoAnim {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      40%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      80%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.05); }
    }

    @keyframes tituloAnim {
      0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      40%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      80%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.05); }
    }

    /* Contenedor del menú */
    .menu-wrap {
      position: absolute;
      left: 50%;
      top: 55%;
      transform: translate(-50%, -50%) scale(1);
      width: 90%;
      max-width: 700px;
      text-align: center;
      opacity: 0;
      animation: fadeIn 2s ease forwards;
      animation-delay: 3.7s;
      background-color: rgba(255, 255, 255, 0.85);
      border-radius: 12px;
      padding: 30px 20px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -48%); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }

    .seccion {
      font-family: "Playfair Display", serif;
      font-size: 1.4rem;
      font-weight: 600;
      margin-top: 25px;
    }

    .platos {
      font-family: "Poppins", sans-serif;
      font-size: 1.2rem;
      font-weight: 300;
      margin-top: 8px;
      line-height: 1.8;
    }

    .precio {
      position: absolute;
      right: 40px;
      bottom: 40px;
      font-family: "Poppins", sans-serif;
      font-style: italic;
      font-size: 1.2rem;
      opacity: 0;
      animation: appear 1s ease forwards;
      animation-delay: 4.5s;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Oculta el menú */
    .menu-wrap.out {
      animation: fadeOut 0.8s ease forwards;
      animation-delay: 10.5s;
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      to { opacity: 0; transform: translate(-50%, -52%) scale(1.02); }
    }

    /* Parte final */
    .final {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      opacity: 0;
      animation: finalIn 1s ease forwards;
      animation-delay: 11.2s;
      color: #000000;
    }

    @keyframes finalIn {
      from { opacity: 0; transform: translate(-50%, -45%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }

    .final .line1 {
      font-family: "Playfair Display", serif;
      font-size: 2rem;
    }

    .final .line2 img {
      width: 180px;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="stage">
    <img src="logo.png" alt="Logo Destaco" class="logo">
    <div class="titulo inicial">Menú del día</div>

    <div id="menu" class="menu-wrap">
      <div class="seccion">PRIMEROS</div>
      <div class="platos">GUISO DE GARBANZOS CON POLLO<br>ENSALADA DE QUESO DE CABRA Y PERA<br>SALMOREJO<br>HABAS CON JAMÓN</div>

      <div class="seccion">SEGUNDOS</div>
      <div class="platos">ALBONDIGAS DE POLLO<br>LOMO DE CERDO EN SALSA<br>CALAMARES A LA ROMANA<br>MERO AL HORNO</div>

      <div class="seccion">INCLUIDO</div>
      <div class="platos">1 PAN<br>1 BEBIDA<br>CAFÉ o POSTRE</div>

      <div class="precio">Precio: 13.50 €</div>
    </div>

    <div class="final">
      <div class="line1">Disfruta de nuestro menú en</div>
      <div class="line2">
        <img src="1.png" alt="Logo O">
      </div>
    </div>
  </div>

  <script>
    // Activa el fondo justo al mostrar la comida
    setTimeout(() => {
      document.body.classList.add('con-fondo');
    }, 3500);

    // Lo quita antes de la parte final
    setTimeout(() => {
      document.body.classList.remove('con-fondo');
      document.body.classList.add('sin-fondo');
    }, 10500);

    // Ocultar menú tras su salida
    const menu = document.getElementById('menu');
    menu.addEventListener('animationend', e => {
      if (e.animationName === 'fadeOut') {
        menu.style.display = 'none';
      }
    });
    setTimeout(() => {
      menu.classList.add('out');
    }, 10500);
  </script>
</body>
</html>
