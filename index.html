<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Menú Bar Destaco - Fondo dinámico</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,600&family=Poppins:wght@300;500&display=swap');

:root {
  --bg: #ffffff;
}

html, body {
  margin: 0;
  min-height: 100dvh;
  background: var(--bg);
  font-family: "Poppins", sans-serif;
  transition: background 1s ease-in-out;
}

/* Fondo */
body.con-fondo {
  background: url('fondo1.png') no-repeat center center;
  background-size: cover;
}

/* CONTENEDOR GENERAL */
.stage {
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 20px;
  box-sizing: border-box;
  text-align: center;
}

/* LOGO + TITULO */
.intro {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 15px;
  animation: introAnim 3.5s forwards;
}

.logo {
  width: clamp(140px, 40vw, 260px);
  background: white;
  padding: 10px;
  border-radius: 50%;
}

.titulo {
  font-family: "Playfair Display", serif;
  font-size: clamp(1.4rem, 5vw, 2rem);
  font-weight: 700;
}

@keyframes introAnim {
  0% { opacity: 0; transform: scale(0.9); }
  20% { opacity: 1; }
  80% { opacity: 1; }
  100% { opacity: 0; transform: scale(1.05); }
}

/* MENU */
.menu-wrap {
  width: 100%;
  max-width: 600px;
  background: rgba(255,255,255,0.92);
  border-radius: 12px;
  padding: 25px 15px 40px 15px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  opacity: 0;
  animation: fadeIn 1.5s forwards;
  animation-delay: 3.7s;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.seccion {
  font-family: "Playfair Display", serif;
  font-size: clamp(1.1rem, 4vw, 1.4rem);
  font-weight: 600;
  margin-top: 20px;
}

.platos {
  font-size: clamp(0.95rem, 3.5vw, 1.15rem);
  line-height: 1.6;
  margin-top: 6px;
}

.precio {
  margin-top: 25px;
  font-style: italic;
  font-size: 1.1rem;
}

/* FINAL */
.final {
  margin-top: 40px;
  opacity: 0;
  animation: finalIn 1s forwards;
  animation-delay: 11s;
}

@keyframes finalIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.final img {
  width: clamp(120px, 35vw, 180px);
}
</style>
</head>
<body>
  <div class="stage">
    <div class="intro">
          <img src="logo.png" class="logo">
          <div class="titulo">Menú del día</div>
    </div>

    <div id="menu" class="menu-wrap">
      <div class="seccion">PRIMEROS</div>
      <div class="platos">GUISO DE GARBANZOS CON POLLO<br>ENSALADA DE QUESO DE CABRA Y PERA<br>SALMOREJO<br>HABAS CON JAMÓN</div>

      <div class="seccion">SEGUNDOS</div>
      <div class="platos">ALBONDIGAS DE POLLO<br>LOMO DE CERDO EN SALSA<br>CALAMARES A LA ROMANA<br>MERO AL HORNO</div>

      <div class="seccion">INCLUIDO</div>
      <div class="platos">1 PAN<br>1 BEBIDA<br>CAFÉ o POSTRE</div>

      <div class="precio">Precio: 13.50 €</div>
    </div>

    <div class="final">
      <div class="line1">Disfruta de nuestro menú en</div>
      <div class="line2">
        <img src="1.png" alt="Logo O">
      </div>
    </div>
  </div>

  <script>
    // Activa el fondo justo al mostrar la comida
    setTimeout(() => {
      document.body.classList.add('con-fondo');
    }, 3500);

    // Lo quita antes de la parte final
    setTimeout(() => {
      document.body.classList.remove('con-fondo');
      document.body.classList.add('sin-fondo');
    }, 10500);

    // Ocultar menú tras su salida
    const menu = document.getElementById('menu');
    menu.addEventListener('animationend', e => {
      if (e.animationName === 'fadeOut') {
        menu.style.display = 'none';
      }
    });
    setTimeout(() => {
      menu.classList.add('out');
    }, 10500);
  </script>
</body>
</html>
